  /businesses/{businessId}/appointments:
    get:
      tags: [auth]
      operationId: listAppointmentsForBusiness
      summary: List a business's incoming appointments.
      description: |
        Authenticated. Caller must own the business or be `ADMIN`. The
        ownership check is enforced by `AppointmentService.listForBusiness`
        and surfaces as 403 on failure.

        Listing order: `starts_at DESC, id DESC`. No cursor pagination in
        MVP — a single business's appointment count is small.
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
