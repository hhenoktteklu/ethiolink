openapi: 3.1.0
info:
  title: EthioLink API
  version: 0.1.0
  description: |
    EthioLink REST API. The canonical narrative contract lives in
    docs/architecture/API_SPEC.md; this OpenAPI document is filled out
    endpoint-by-endpoint as each phase ships. Phase 1 covers the auth/profile
    sync endpoints below.
servers:
  - url: https://api-dev.ethiolink.example/v1
    description: Dev (placeholder — replaced after `terraform apply`)
  - url: https://api.ethiolink.example/v1
    description: Prod (placeholder)
security:
  - cognito: []
tags:
  - name: auth
    description: Authentication and profile sync.
  - name: catalog
    description: Public-facing catalog (categories, businesses).
paths:
  /categories:
    get:
      tags: [catalog]
      operationId: listCategories
      summary: List active business categories.
      description: |
        Returns active categories sorted by `sort_order ASC`, then by the
        English name. Public endpoint — no authentication required.

        The response always includes `nextCursor: null`. The category set
        is small (currently four MVP entries: Salon, Barber, Spa, Beauty
        Professional) and is not paginated; the cursor field is retained
        for symmetry with other listing endpoints so clients can handle
        every listing with a single code path.
      security: []
      responses:
        '200':
          description: The list of active categories.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryList'
        '500':
          $ref: '#/components/responses/InternalError'
  /businesses:
    get:
      tags: [catalog]
      operationId: listBusinesses
      summary: List APPROVED businesses with filters and cursor pagination.
      description: |
        Public endpoint. Returns approved businesses ordered by
        `featured_until DESC NULLS LAST, rating_avg DESC, created_at DESC,
        id DESC`. All filters are optional; an empty or whitespace-only
        value is treated as "no filter".

        Pagination is cursor-based. Pass the `nextCursor` value from a
        previous response as `cursor` to fetch the next page; `nextCursor`
        is `null` on the final page.
      security: []
      parameters:
        - name: category
          in: query
          required: false
          description: |
            Active category slug (e.g. `salon`). Rejected with
            VALIDATION_ERROR if the slug is unknown or inactive.
          schema:
            type: string
        - name: city
          in: query
          required: false
          description: Case-insensitive exact match on city name.
          schema:
            type: string
        - name: query
          in: query
          required: false
          description: Partial match on business name (case-insensitive).
          schema:
            type: string
        - name: ratingMin
          in: query
          required: false
          schema:
            type: number
            minimum: 0
            maximum: 5
        - name: cursor
          in: query
          required: false
          description: Opaque pagination cursor from a previous response.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: A page of approved businesses.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessList'
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [auth]
      operationId: createBusiness
      summary: Create a DRAFT business profile for the calling owner.
      description: |
        Authenticated. Requires the caller's role to be `BUSINESS_OWNER`.
        Creates a fresh DRAFT business owned by the caller; subsequent
        edits use `PATCH /v1/businesses/{id}`, submission for admin review
        uses `POST /v1/businesses/{id}/submit`.

        MVP enforces one business per owner. A second create call by the
        same owner returns 409 CONFLICT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBusinessRequest'
      responses:
        '200':
          description: The created business.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessOwnerView'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /businesses/{id}:
    get:
      tags: [catalog]
      operationId: getBusiness
      summary: Get one APPROVED business by id.
      description: |
        Public endpoint. Returns 404 if the id does not exist or if the
        business is not in the APPROVED state. The owner's view (any
        status) is served by `GET /v1/me/business`.
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The business profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessPublicView'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    patch:
      tags: [auth]
      operationId: patchBusiness
      summary: Edit the caller's business.
      description: |
        Authenticated. Requires the caller's role to be `BUSINESS_OWNER`
        and the caller to own the business (the request is rejected with
        403 otherwise). All fields are optional — `undefined` means "no
        change", explicit `null` clears the column. Unknown fields are
        tolerated. An empty `{}` body is a valid no-op.

        Phase 2 scope: owner-only. Admin write paths (API_SPEC notes
        "owner or ADMIN") land in Phase 5.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchBusinessRequest'
      responses:
        '200':
          description: The updated business.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessOwnerView'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /businesses/{id}/submit:
    post:
      tags: [auth]
      operationId: submitBusiness
      summary: Submit a DRAFT business for admin review.
      description: |
        Authenticated. Requires the caller's role to be `BUSINESS_OWNER`
        and ownership of the business. Transitions DRAFT → PENDING_REVIEW.
        Only valid from `DRAFT`; any other source status returns 409.

        Submission requires `name`, `description` (with non-empty `en`),
        `city`, and `categoryId` to be set on the business; otherwise the
        request is rejected with 400 and `details.missing[]` lists the
        empty fields.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The business with status PENDING_REVIEW.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessOwnerView'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /me/business:
    get:
      tags: [auth]
      operationId: getMyBusiness
      summary: Get the caller's own business at any status.
      description: |
        Returns the calling owner's business — DRAFT, PENDING_REVIEW,
        APPROVED, REJECTED, or SUSPENDED. The owner view includes
        `status` and `ownerUserId`, which the public view omits.

        Returns 404 if the caller has not yet called `POST /v1/auth/sync`
        or has not yet created a business via `POST /v1/businesses`.
      responses:
        '200':
          description: The caller's business.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessOwnerView'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /auth/sync:
    post:
      tags: [auth]
      operationId: authSync
      summary: Sync the calling Cognito user into the users table.
      description: |
        Idempotent. Creates a `users` row on the first call, defaulting `role`
        from the highest-precedence Cognito group (ADMIN > BUSINESS_OWNER >
        CUSTOMER). Subsequent calls refresh `email`, `phone`, `role`, and
        `displayName` from the principal — `status` is never modified by sync.
      responses:
        '200':
          description: User row created or refreshed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'
  /me:
    get:
      tags: [auth]
      operationId: getMe
      summary: Get the calling user's profile.
      description: |
        Looks up the user by Cognito sub. Returns 404 if the caller has not
        yet hit `POST /v1/auth/sync`.
      responses:
        '200':
          description: The current user's profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    patch:
      tags: [auth]
      operationId: patchMe
      summary: Update the calling user's profile.
      description: |
        Phase 1 scope: only `displayName` is mutable. The `preferredCity`
        field documented in API_SPEC.md will be added once the
        `customer_profiles` table is created.

        Body fields are all optional; an empty `{}` is a valid no-op.
        Unknown fields are tolerated (ignored) for forward compatibility.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchMeRequest'
      responses:
        '200':
          description: The updated user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  securitySchemes:
    cognito:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Cognito-issued ID token, verified by `aws-jwt-verify`.
  schemas:
    User:
      type: object
      required: [id, role, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: [string, 'null']
          format: email
        phone:
          type: [string, 'null']
          description: E.164 phone number, if the user signed up with phone.
        displayName:
          type: [string, 'null']
        role:
          type: string
          enum: [CUSTOMER, BUSINESS_OWNER, ADMIN]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PatchMeRequest:
      type: object
      description: |
        Patch shape for `PATCH /v1/me`. All fields optional.
        `null` clears a field; a string sets it. Strings are trimmed by
        the server before validation.
      properties:
        displayName:
          type: [string, 'null']
          minLength: 1
          maxLength: 100
    LocalizedText:
      type: object
      description: |
        Localized text. Keys are ISO 639-1 language codes. MVP writes
        only `en`; `am` (Amharic) is reserved for a later content pass.
      required: [en]
      properties:
        en:
          type: string
        am:
          type: string
    CategoryView:
      type: object
      required: [id, slug, name, sortOrder, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
          description: Stable machine-friendly key, e.g. `salon`.
        name:
          $ref: '#/components/schemas/LocalizedText'
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CategoryList:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CategoryView'
        nextCursor:
          type: [string, 'null']
          description: |
            Opaque cursor for the next page. Always `null` for
            `/categories` — included for symmetry with paginated
            listings elsewhere in the API.
    BusinessPublicView:
      type: object
      description: |
        Public projection of a business profile. Omits `ownerUserId` and
        `status` — the listing only ever surfaces APPROVED rows.
      required:
        - id
        - categoryId
        - ratingAvg
        - ratingCount
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        categoryId:
          type: string
          format: uuid
        name:
          type: [string, 'null']
        description:
          oneOf:
            - $ref: '#/components/schemas/LocalizedText'
            - type: 'null'
        city:
          type: [string, 'null']
        addressLine:
          type: [string, 'null']
        latitude:
          type: [number, 'null']
        longitude:
          type: [number, 'null']
        phone:
          type: [string, 'null']
        telegramHandle:
          type: [string, 'null']
        whatsappPhone:
          type: [string, 'null']
        featuredUntil:
          type: [string, 'null']
          format: date-time
        ratingAvg:
          type: number
        ratingCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    BusinessOwnerView:
      allOf:
        - $ref: '#/components/schemas/BusinessPublicView'
        - type: object
          description: |
            Owner-only projection. Adds the fields the public view omits.
          required: [ownerUserId, status]
          properties:
            ownerUserId:
              type: string
              format: uuid
            status:
              type: string
              enum: [DRAFT, PENDING_REVIEW, APPROVED, REJECTED, SUSPENDED]
    BusinessList:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BusinessPublicView'
        nextCursor:
          type: [string, 'null']
          description: |
            Opaque cursor for the next page. `null` when there are no
            more results. Pass the value back as the `cursor` query
            parameter to fetch the next page.
    BusinessFieldsBase:
      type: object
      description: |
        Common business profile fields shared by create and patch request
        bodies. All fields are optional from this base schema's perspective
        — `CreateBusinessRequest` additionally requires `categoryId`.
      properties:
        categoryId:
          type: string
          format: uuid
        name:
          type: [string, 'null']
          maxLength: 200
        description:
          oneOf:
            - $ref: '#/components/schemas/LocalizedText'
            - type: 'null'
        city:
          type: [string, 'null']
          maxLength: 100
        addressLine:
          type: [string, 'null']
          maxLength: 500
        latitude:
          type: [number, 'null']
          minimum: -90
          maximum: 90
        longitude:
          type: [number, 'null']
          minimum: -180
          maximum: 180
        phone:
          type: [string, 'null']
          maxLength: 50
        telegramHandle:
          type: [string, 'null']
          maxLength: 50
        whatsappPhone:
          type: [string, 'null']
          maxLength: 50
    CreateBusinessRequest:
      allOf:
        - $ref: '#/components/schemas/BusinessFieldsBase'
        - type: object
          required: [categoryId]
    PatchBusinessRequest:
      allOf:
        - $ref: '#/components/schemas/BusinessFieldsBase'
        - type: object
          description: |
            Partial update. Each field optional: `undefined` (absent) means
            "no change", explicit `null` clears the column. Unknown fields
            are tolerated.
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, details]
          properties:
            code:
              type: string
              enum:
                - UNAUTHENTICATED
                - FORBIDDEN
                - NOT_FOUND
                - VALIDATION_ERROR
                - CONFLICT
                - SLOT_UNAVAILABLE
                - RATE_LIMITED
                - INTERNAL_ERROR
            message:
              type: string
            details:
              type: object
              additionalProperties: true
  responses:
    Unauthenticated:
      description: Missing or invalid Cognito JWT.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Authenticated, but caller lacks the required role or ownership.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: |
        Request conflicts with the current resource state (e.g. invalid
        status transition, duplicate per-owner business).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Target resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ValidationError:
      description: Request body or parameters failed validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: Unexpected server-side failure.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
