  /appointments/{id}/cancel:
    post:
      tags: [auth]
      operationId: cancelAppointment
      summary: Cancel an appointment.
      description: |
        Authenticated. The actor is derived from the caller:
          * `ADMIN` role → admin cancel (bypasses cutoff).
          * caller is the customer → customer cancel (cutoff applies).
          * caller owns the business → business cancel (bypasses cutoff).
          * otherwise → 403.

        The cancellation cutoff is `BOOKING_CANCEL_CUTOFF_MINUTES`
        (default 240). Customer attempts inside the cutoff return 409
        CONFLICT.

        Body accepts an optional `reason`; the reason is persisted to
        `appointments.cancel_reason`.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelAppointmentRequest'
      responses:
        '200':
          description: The updated appointment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentView'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
