        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /appointments:
    post:
      tags: [auth]
      operationId: createAppointment
      summary: Book an appointment for the calling customer.
      description: |
        Authenticated. Requires the caller's role to be `CUSTOMER`. The
        body specifies the staff member, the service, the desired
        `startsAt` (ISO-8601), and the payment method. The service
        validates that the requested instant is in the computed slot
        list for that day and authorizes payment before INSERT.

        Payment methods:
          * `CASH` — settles in person; succeeds immediately.
          * `ONLINE_PENDING` — returns 400 with `ONLINE_PAYMENTS_UNAVAILABLE`
            in the response body in MVP. Real Telebirr / Chapa / CBE_BIRR
            providers ship post-MVP behind the same gateway port.

        Double-book races are caught by the migration-0009 exclusion
        constraint and translated to 409 `SLOT_UNAVAILABLE`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAppointmentRequest'
      responses:
        '200':
          description: The created appointment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentView'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
