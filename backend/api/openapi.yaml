            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: The subscription history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeaturingSubscriptionList'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /admin/businesses/{id}/featuring/comp:
    post:
      tags: [admin]
      operationId: adminCompFeaturing
      summary: Create an admin-comp featuring subscription.
      description: |
        Authenticated, ADMIN-only. Phase 9 Track 6. Creates an
        ACTIVE featuring subscription with `source = ADMIN_COMP`
        and `price_etb = 0`. Refuses when the business already has
        an ACTIVE subscription (409 CONFLICT).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCompFeaturingRequest'
      responses:
        '200':
          description: The created subscription.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeaturingSubscription'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /admin/businesses/{id}/featuring/cancel:
    post:
      tags: [admin]
      operationId: adminCancelFeaturing
      summary: Force-cancel the active featuring subscription.
      description: |
        Authenticated, ADMIN-only. Phase 9 Track 6. Flips the
        ACTIVE subscription to `CANCELLED`, records the admin's
        reason, and recomputes `business_profiles.featured_until`.
        Refund handling is out-of-band.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCancelFeaturingRequest'
      responses:
        '200':
          description: The cancelled subscription.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeaturingSubscription'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /admin/users:
    get:
      tags: [admin]
      operationId: adminListUsers
      summary: List users across every status and role.
      description: |
        Authenticated, ADMIN-only. Returns `AdminUserView` rows
        (extends `UserView` with `status` so the dashboard can render
        ACTIVE / SUSPENDED / DELETED bands). `cognito_sub` stays
        hidden.

        Sort: `created_at DESC, id DESC`. No cursor pagination in
        MVP — `limit` caps at 100, default 50.
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [ACTIVE, SUSPENDED, DELETED]
        - name: role
          in: query
          required: false
          schema:
            type: string
            enum: [CUSTOMER, BUSINESS_OWNER, ADMIN]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Admin users listing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserList'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /admin/users/{id}/suspend:
    post:
      tags: [admin]
      operationId: adminSuspendUser
      summary: Suspend an ACTIVE user.
      description: |
        Authenticated, ADMIN-only. ACTIVE → SUSPENDED. Records one
        `SUSPEND_USER` row in `admin_actions`; the optional `notes`
        body field is stored on that row. Suspending a `SUSPENDED`
        or `DELETED` user returns 409 CONFLICT.

        MVP suspension marks the row only — Cognito tokens stay
        valid until expiration. The API authorizer rejects suspended
        users on next request. Token-side revocation is a future
        hardening item.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminNotesRequest'
      responses:
        '200':
          description: The updated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserView'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /admin/users/{id}/restore:
    post:
      tags: [admin]
      operationId: adminRestoreUser
      summary: Restore a SUSPENDED user.
      description: |
        Authenticated, ADMIN-only. SUSPENDED → ACTIVE. Records one
        `RESTORE_USER` row in `admin_actions`; the optional `notes`
        body field is stored on that row. `DELETED` users are
        terminal in MVP and cannot be restored through this
        endpoint; the service refuses with 409 CONFLICT.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminNotesRequest'
      responses:
        '200':
          description: The updated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserView'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /admin/categories:
    get:
      tags: [admin]
      operationId: adminListCategories
      summary: List categories (active + deactivated).
      description: |
        Authenticated, ADMIN-only. Returns `AdminCategoryView` rows
        (extends `CategoryView` with `isActive` so the dashboard can
        render deactivated entries). Sort order matches the public
        canonical listing: `sort_order ASC, name->>'en' ASC`.

        No cursor pagination — `limit` caps at 100, default 100. The
        MVP marketplace has four categories; the cap is generous.
      parameters:
        - name: isActive
          in: query
          required: false
          schema:
            type: boolean
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Admin categories listing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCategoryList'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [admin]
      operationId: adminCreateCategory
      summary: Create a marketplace category.
      description: |
        Authenticated, ADMIN-only. Slug must be unique across all
        categories (active or deactivated). Records one
        `CREATE_CATEGORY` row in `admin_actions`. Returns the created
        row with `isActive: true`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminCreateCategoryRequest'
      responses:
        '200':
          description: The created category.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCategoryView'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /admin/categories/{id}:
    patch:
      tags: [admin]
      operationId: adminPatchCategory
      summary: Update a category.
      description: |
        Authenticated, ADMIN-only. All body fields optional; a `{}`
        body is a valid no-op patch that still records an
        `UPDATE_CATEGORY` audit row. `isActive` is NOT patched here
        — use `DELETE /v1/admin/categories/{id}` to deactivate.
        Slug changes are uniqueness-checked.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminPatchCategoryRequest'
      responses:
        '200':
          description: The updated category.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCategoryView'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [admin]
      operationId: adminDeactivateCategory
      summary: Deactivate (soft-delete) a category.
      description: |
        Authenticated, ADMIN-only. **Soft-delete** — flips `is_active`
        to `false`. The row is preserved so `business_profiles` rows
        referencing this category via FK remain valid. Already-
        inactive categories return 409 CONFLICT. Records one
        `DEACTIVATE_CATEGORY` row in `admin_actions`. Optional
        `{ notes }` body is persisted to the audit row.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminNotesRequest'
      responses:
        '200':
          description: The deactivated category.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminCategoryView'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /admin/notifications:
    get:
      tags: [admin]
      operationId: adminListNotifications
      summary: List `notification_logs` rows (admin troubleshooting).
      description: |
        Authenticated, ADMIN-only. Read-only view across every
        outbound notification attempt the dispatcher has recorded.
        Filters: `status`, `channel`, `recipientUserId`,
        `from` (inclusive lower bound on `createdAt`),
        `to` (exclusive upper bound on `createdAt`). All optional.

        Sort: `created_at DESC, id DESC` — newest attempts first,
        matching the admin's "what just went wrong" mental model.
        No cursor pagination in MVP — `limit` caps at 100,
        default 100.

        Returns `NotificationLogView` items. The raw `payload`
        is passed through verbatim for `<pre>` rendering in the
        admin dashboard.
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/NotificationStatus'
        - name: channel
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/NotificationChannel'
        - name: recipientUserId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Inclusive lower bound on `createdAt`.
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Exclusive upper bound on `createdAt`.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Admin notification-logs listing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationLogList'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
  /admin/appointments:
    get:
      tags: [admin]
      operationId: adminListAppointments
      summary: Cross-business appointment listing.
      description: |
        Authenticated, ADMIN-only. Read-only view across every
        appointment in the system. Filters: `status`, `businessId`,
        `customerId`, `from` (inclusive lower bound on `startsAt`),
        `to` (exclusive upper bound on `startsAt`). All optional.
        Soft-deleted appointments are excluded.

        Sort: `starts_at DESC, id DESC`. No cursor pagination in
        MVP — `limit` caps at 100, default 50.

        Returns standard `AppointmentView` items so admin clients
        can reuse any rendering already wired for the per-customer
        and per-business listings.
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/AppointmentStatus'
        - name: businessId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: customerId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Inclusive lower bound on `startsAt`.
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Exclusive upper bound on `startsAt`.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Admin appointments listing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentList'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /me/business:
    get:
      tags: [auth]
      operationId: getMyBusiness
      summary: Get the caller's own business at any status.
      description: |
        Returns the calling owner's business — DRAFT, PENDING_REVIEW,
        APPROVED, REJECTED, or SUSPENDED. The owner view includes
        `status` and `ownerUserId`, which the public view omits.

        Returns 404 if the caller has not yet called `POST /v1/auth/sync`
        or has not yet created a business via `POST /v1/businesses`.
      responses:
        '200':
          description: The caller's business.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessOwnerView'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /auth/sync:
    post:
      tags: [auth]
      operationId: authSync
      summary: Sync the calling Cognito user into the users table.
      description: |
        Idempotent. Creates a `users` row on the first call, defaulting `role`
        from the highest-precedence Cognito group (ADMIN > BUSINESS_OWNER >
        CUSTOMER). Subsequent calls refresh `email`, `phone`, `role`, and
        `displayName` from the principal — `status` is never modified by sync.
      responses:
        '200':
          description: User row created or refreshed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'
  /me:
    get:
      tags: [auth]
      operationId: getMe
      summary: Get the calling user's profile.
      description: |
        Looks up the user by Cognito sub. Returns 404 if the caller has not
        yet hit `POST /v1/auth/sync`.
      responses:
        '200':
          description: The current user's profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    patch:
      tags: [auth]
      operationId: patchMe
      summary: Update the calling user's profile.
      description: |
        Phase 1 scope: only `displayName` is mutable. The `preferredCity`
        field documented in API_SPEC.md will be added once the
        `customer_profiles` table is created.

        Body fields are all optional; an empty `{}` is a valid no-op.
        Unknown fields are tolerated (ignored) for forward compatibility.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchMeRequest'
      responses:
        '200':
          description: The updated user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /me/appointments:
    get:
      tags: [auth]
      operationId: listMyAppointments
      summary: List the caller's own appointments.
      description: |
        Authenticated. Returns appointments where the caller is the
        customer. `BUSINESS_OWNER` and `ADMIN` callers see only their
        own customer-side bookings (typically empty); the business-side
        listing lives at `GET /v1/businesses/{businessId}/appointments`.

        Listing order: `starts_at DESC, id DESC`. No cursor pagination
        in MVP.
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/AppointmentStatus'
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Inclusive lower bound on `startsAt`.
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Exclusive upper bound on `startsAt`.
      responses:
        '200':
          description: The caller's appointments.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentList'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /me/link-telegram/start:
    post:
      tags: [auth]
      operationId: startTelegramLink
      summary: Issue a Telegram linking code for the calling user.
      description: |
        Authenticated. Generates a single-use linking code and returns the
        `https://t.me/<bot>?start=<code>` deep link the mobile app should
        open. The bot's `/start <code>` message redeems the code via the
        webhook below, writing `users.telegram_chat_id`. Each call
        invalidates any prior in-flight code for the same user.

        Returns 503 when the operator has not configured a Telegram
        provider for the environment (`config.telegramProvider` is null).
      responses:
        '200':
          description: A fresh linking deep link.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelegramLinkStartResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          description: Telegram integration is not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /me/telegram-status:
    get:
      tags: [auth]
      operationId: getTelegramStatus
      summary: Read the caller's Telegram linking status.
      description: |
        Authenticated. Returns whether the caller has a populated
        `users.telegram_chat_id`. `linkedAt` is the user row's
        `updatedAt` when linked, mirroring the most recent write.
      responses:
        '200':
          description: The caller's Telegram linking status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelegramStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /me/link-telegram:
    delete:
      tags: [auth]
      operationId: unlinkTelegram
      summary: Clear the caller's Telegram chat id.
      description: |
        Authenticated. Idempotent — calling it on an already-unlinked
        user returns 200 with `{ linked: false }` exactly as the
        first call.

        Returns 503 when the operator has not configured a Telegram
        provider for the environment.
      responses:
        '200':
          description: The caller is no longer linked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelegramUnlinkResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          description: Telegram integration is not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /integrations/telegram/webhook:
    post:
      tags: [catalog]
      operationId: telegramWebhook
      summary: Inbound Telegram Bot API webhook.
      description: |
        Public route. Telegram POSTs every Update to this endpoint
        from its own infrastructure. Authentication is via the
        `X-Telegram-Bot-Api-Secret-Token` header — set to the
        operator-supplied `telegramProvider.webhookSecret` when
        `setWebhook` was called. Mismatch returns 401.

        The handler only acts on `/start <code>` messages — it
        redeems the code via the linking service, binds the chat id
        to the user, and replies with a confirmation. Every other
        update is silently acknowledged with 200 so Telegram does
        not retry. Non-2xx is reserved for "Telegram should retry"
        (server error) or "Telegram has the wrong secret" (401).
      security: []
      parameters:
        - name: X-Telegram-Bot-Api-Secret-Token
          in: header
          required: true
          schema:
            type: string
          description: Operator-supplied webhook secret. Compared in constant time to `telegramProvider.webhookSecret`.
      requestBody:
        required: true
        description: A Telegram Update payload. The handler accepts any shape — only `message.text` and `message.chat.id` are read.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelegramUpdate'
      responses:
        '200':
          description: Update acknowledged (regardless of whether it triggered a link).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelegramWebhookAck'
        '401':
          description: Webhook secret mismatch.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          description: Telegram integration is not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  securitySchemes:
    cognito:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Cognito-issued ID token, verified by `aws-jwt-verify`.
  schemas:
    User:
      type: object
      required: [id, role, locale, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: [string, 'null']
          format: email
        phone:
          type: [string, 'null']
          description: E.164 phone number, if the user signed up with phone.
        displayName:
          type: [string, 'null']
        role:
          type: string
          enum: [CUSTOMER, BUSINESS_OWNER, ADMIN]
        locale:
          type: string
          enum: [en, am]
          description: |
            Preferred UI + notification locale. Phase 9 Track 5.
            Defaults to `en` server-side; mutated through
            `PATCH /v1/me`. The Flutter app reads this at sign-in
            to prime its UI locale.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PatchMeRequest:
      type: object
      description: |
        Patch shape for `PATCH /v1/me`. All fields optional.
        `null` clears a field; a string sets it. Strings are trimmed by
        the server before validation. `locale` does NOT accept `null`
        (the column is `NOT NULL`); omit the field to leave it
        unchanged.
      properties:
        displayName:
          type: [string, 'null']
          minLength: 1
          maxLength: 100
        locale:
          type: string
          enum: [en, am]
          description: |
            Preferred UI + notification locale. Phase 9 Track 5.
            Unknown values yield a 400 VALIDATION_ERROR.
    LocalizedText:
      type: object
      description: |
        Localized text. Keys are ISO 639-1 language codes. MVP writes
        only `en`; `am` (Amharic) is reserved for a later content pass.
      required: [en]
      properties:
        en:
          type: string
        am:
          type: string
    CategoryView:
      type: object
      required: [id, slug, name, sortOrder, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
          description: Stable machine-friendly key, e.g. `salon`.
        name:
          $ref: '#/components/schemas/LocalizedText'
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AdminCategoryView:
      allOf:
        - $ref: '#/components/schemas/CategoryView'
        - type: object
          description: |
            Admin projection. Extends `CategoryView` with `isActive`
            so the dashboard can render deactivated entries
            distinctly from active ones.
          required: [isActive]
          properties:
            isActive:
              type: boolean
    AdminCategoryList:
      type: object
      description: |
        Admin listing of categories. No cursor pagination in MVP —
        `limit` caps the row count at the call site.
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AdminCategoryView'
    AdminCreateCategoryRequest:
      type: object
      required: [slug, name]
      properties:
        slug:
          type: string
          description: Stable machine-friendly key. Trimmed; max 64 chars.
          maxLength: 64
        name:
          $ref: '#/components/schemas/LocalizedText'
        sortOrder:
          type: integer
          minimum: 0
          description: Optional. Defaults to `0`.
        notes:
          type: [string, 'null']
          maxLength: 2000
          description: Optional. Persisted to the `admin_actions` audit row.
    AdminPatchCategoryRequest:
      type: object
      description: |
        Patch shape — every field optional. A `{}` body is a valid
        no-op patch that still records an `UPDATE_CATEGORY` audit
        row (admin intent). `isActive` is NOT in this shape — use
        `DELETE /v1/admin/categories/{id}` to deactivate.
      properties:
        slug:
          type: string
          maxLength: 64
        name:
          $ref: '#/components/schemas/LocalizedText'
        sortOrder:
          type: integer
          minimum: 0
        notes:
          type: [string, 'null']
          maxLength: 2000
    CategoryList:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CategoryView'
        nextCursor:
          type: [string, 'null']
          description: |
            Opaque cursor for the next page. Always `null` for
            `/categories` — included for symmetry with paginated
            listings elsewhere in the API.
    BusinessPublicView:
      type: object
      description: |
        Public projection of a business profile. Omits `ownerUserId` and
        `status` — the listing only ever surfaces APPROVED rows.
      required:
        - id
        - categoryId
        - ratingAvg
        - ratingCount
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        categoryId:
          type: string
          format: uuid
        name:
          type: [string, 'null']
        description:
          oneOf:
            - $ref: '#/components/schemas/LocalizedText'
            - type: 'null'
        city:
          type: [string, 'null']
        addressLine:
          type: [string, 'null']
        latitude:
          type: [number, 'null']
        longitude:
          type: [number, 'null']
        phone:
          type: [string, 'null']
        telegramHandle:
          type: [string, 'null']
        whatsappPhone:
          type: [string, 'null']
        featuredUntil:
          type: [string, 'null']
          format: date-time
        ratingAvg:
          type: number
        ratingCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        searchRank:
          type: [number, 'null']
          description: |
            Phase 9 Track 6. Full-text rank for the matching row;
            non-null only when the listing was issued with
            `sort=relevance` and a non-empty `q`. `null` for every
            other call path (other sorts, single-row reads,
            owner-side endpoints). Higher = better match. Clients
            may use this to render a debug match-strength badge
            but it is not required for normal display.
    BusinessOwnerView:
      allOf:
        - $ref: '#/components/schemas/BusinessPublicView'
        - type: object
          description: |
            Owner-only projection. Adds the fields the public view omits.
          required: [ownerUserId, status]
          properties:
            ownerUserId:
              type: string
              format: uuid
            status:
              type: string
              enum: [DRAFT, PENDING_REVIEW, APPROVED, REJECTED, SUSPENDED]
    BusinessList:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BusinessPublicView'
        nextCursor:
          type: [string, 'null']
          description: |
            Opaque cursor for the next page. `null` when there are no
            more results. Pass the value back as the `cursor` query
            parameter to fetch the next page.
    BusinessOwnerList:
      type: object
      description: |
        Admin listing of businesses. No cursor pagination in MVP;
        `limit` caps the row count at the call site.
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BusinessOwnerView'
    AdminUserView:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          description: |
            Admin projection. Extends `User` with `status` so the
            dashboard can render ACTIVE / SUSPENDED / DELETED bands.
            `cognito_sub` stays hidden.
          required: [status]
          properties:
            status:
              type: string
              enum: [ACTIVE, SUSPENDED, DELETED]
    AdminUserList:
      type: object
      description: |
        Admin listing of users. No cursor pagination in MVP; `limit`
        caps the row count at the call site.
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AdminUserView'
    AdminNotesRequest:
      type: object
      description: |
        Common request body for admin action endpoints that take a
        free-text note (approve / reject / suspend). Persisted to
        `admin_actions.notes`.
      properties:
        notes:
          type: [string, 'null']
          maxLength: 2000
    AdminFeatureRequest:
      type: object
      description: |
        Request body for `POST /v1/admin/businesses/{id}/feature`.
        `featuredUntil` is required-and-nullable: pass an ISO-8601
        datetime to feature, or `null` to unfeature. `notes` is
        optional and persisted to the audit row.
      required: [featuredUntil]
      properties:
        featuredUntil:
          type: [string, 'null']
          format: date-time
          description: ISO-8601 UTC datetime, or `null` to clear.
        notes:
          type: [string, 'null']
          maxLength: 2000
    FeaturingPackage:
      type: object
      description: |
        Phase 9 Track 6 — a paid featuring package. Server-priced;
        owners never send a price on the wire.
      required: [code, durationDays, priceEtb]
      properties:
        code:
          type: string
          enum: [FEATURING_7D, FEATURING_30D]
        durationDays:
          type: integer
          minimum: 1
        priceEtb:
          type: number
          minimum: 0
    FeaturingPackageList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/FeaturingPackage'
    FeaturingSubscription:
      type: object
      description: |
        Phase 9 Track 6 — a featuring subscription row. The
        `status` value drives the lifecycle. ACTIVE rows project
        `endsAt` into `business_profiles.featured_until`. Sweep
        Lambda runs every 15 minutes to expire past-due ACTIVE
        rows.
      required:
        - id
        - businessId
        - packageCode
        - priceEtb
        - startsAt
        - endsAt
        - status
        - source
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        packageCode:
          type: string
          enum: [FEATURING_7D, FEATURING_30D]
        priceEtb:
          type: number
          minimum: 0
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [PENDING_PAYMENT, ACTIVE, EXPIRED, CANCELLED, REFUNDED]
        source:
          type: string
          enum: [OWNER_PURCHASE, ADMIN_COMP]
        cancelledAt:
          type: [string, 'null']
          format: date-time
        cancelledReason:
          type: [string, 'null']
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    FeaturingSubscriptionList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/FeaturingSubscription'
    SubscribeFeaturingRequest:
      type: object
      description: |
        Request body for
        `POST /v1/businesses/{businessId}/featuring/subscribe`.
        Server-priced — owners pick the package, the server picks
        the amount.
      required: [packageCode]
      properties:
        packageCode:
          type: string
          enum: [FEATURING_7D, FEATURING_30D]
    AdminCompFeaturingRequest:
      type: object
      description: |
        Request body for
        `POST /v1/admin/businesses/{id}/featuring/comp`. Creates an
        ACTIVE subscription with `source = ADMIN_COMP` and price 0.
      required: [durationDays, reason]
      properties:
        durationDays:
          type: integer
          minimum: 1
          maximum: 365
        reason:
          type: string
          minLength: 1
          maxLength: 500
    AdminCancelFeaturingRequest:
      type: object
      description: |
        Request body for
        `POST /v1/admin/businesses/{id}/featuring/cancel`. Cancels
        the currently-ACTIVE subscription and records the reason.
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 500
    BusinessFieldsBase:
      type: object
      description: |
        Common business profile fields shared by create and patch request
        bodies. All fields are optional from this base schema's perspective
        — `CreateBusinessRequest` additionally requires `categoryId`.
      properties:
        categoryId:
          type: string
          format: uuid
        name:
          type: [string, 'null']
          maxLength: 200
        description:
          oneOf:
            - $ref: '#/components/schemas/LocalizedText'
            - type: 'null'
        city:
          type: [string, 'null']
          maxLength: 100
        addressLine:
          type: [string, 'null']
          maxLength: 500
        latitude:
          type: [number, 'null']
          minimum: -90
          maximum: 90
        longitude:
          type: [number, 'null']
          minimum: -180
          maximum: 180
        phone:
          type: [string, 'null']
          maxLength: 50
        telegramHandle:
          type: [string, 'null']
          maxLength: 50
        whatsappPhone:
          type: [string, 'null']
          maxLength: 50
    CreateBusinessRequest:
      allOf:
        - $ref: '#/components/schemas/BusinessFieldsBase'
        - type: object
          required: [categoryId]
    PatchBusinessRequest:
      allOf:
        - $ref: '#/components/schemas/BusinessFieldsBase'
        - type: object
          description: |
            Partial update. Each field optional: `undefined` (absent) means
            "no change", explicit `null` clears the column. Unknown fields
            are tolerated.
    MediaOwnerType:
      type: string
      enum: [BUSINESS, STAFF, USER]
      description: |
        Polymorphic owner of a media asset. Mirrors the `owner_type`
        CHECK constraint on `media_assets`.
    AllowedMediaContentType:
      type: string
      enum: [image/jpeg, image/png, image/webp]
      description: Phase 2 content-type allowlist. PDFs land in Phase 3.
    IssueMediaUploadUrlRequest:
      type: object
      required: [ownerType, ownerId, contentType]
      properties:
        ownerType:
          $ref: '#/components/schemas/MediaOwnerType'
        ownerId:
          type: string
          format: uuid
        contentType:
          $ref: '#/components/schemas/AllowedMediaContentType'
        fileExtension:
          type: string
          maxLength: 16
          description: |
            Optional filename-extension hint. The gateway may embed it in
            the storage key for nicer browser-visible filenames. If
            omitted, the gateway derives an extension from `contentType`.
    IssueMediaUploadUrlResponse:
      type: object
      required: [uploadUrl, storageKey, expiresAt, requiredHeaders]
      properties:
        uploadUrl:
          type: string
          format: uri
          description: Single-use S3 PUT URL. Expires by `expiresAt`.
        storageKey:
          type: string
          description: |
            Stable storage-side key. Pass back as `storageKey` in
            `POST /v1/media` to confirm the upload.
        expiresAt:
          type: string
          format: date-time
        requiredHeaders:
          type: object
          additionalProperties:
            type: string
          description: |
            Headers the client MUST send on the PUT for the signature to
            match. For S3 this typically includes `Content-Type`.
    ConfirmMediaUploadRequest:
      type: object
      required: [ownerType, ownerId, storageKey, contentType]
      properties:
        ownerType:
          $ref: '#/components/schemas/MediaOwnerType'
        ownerId:
          type: string
          format: uuid
        storageKey:
          type: string
          maxLength: 1024
        contentType:
          $ref: '#/components/schemas/AllowedMediaContentType'
        width:
          type: integer
          minimum: 0
        height:
          type: integer
          minimum: 0
    ServiceFieldsBase:
      type: object
      description: |
        Common fields for create / patch request bodies on a service.
        All fields are optional in this base schema; create / patch add
        their own required-field constraints via `allOf`.
      properties:
        name:
          $ref: '#/components/schemas/LocalizedText'
        description:
          oneOf:
            - $ref: '#/components/schemas/LocalizedText'
            - type: 'null'
        durationMinutes:
          type: integer
          minimum: 1
          maximum: 720
        priceEtb:
          type: [number, 'null']
          minimum: 0
          maximum: 9999999.99
          description: ETB price; up to 2 decimal places. `null` clears the price.
    CreateServiceRequest:
      allOf:
        - $ref: '#/components/schemas/ServiceFieldsBase'
        - type: object
          required: [name, durationMinutes]
    PatchServiceRequest:
      allOf:
        - $ref: '#/components/schemas/ServiceFieldsBase'
        - type: object
          description: |
            Partial update. Each field optional. `name` and
            `durationMinutes` cannot be `null` (DB is NOT NULL);
            `description` and `priceEtb` accept `null` to clear.
            Unknown fields are tolerated.
    ServiceView:
      type: object
      required: [id, businessId, name, durationMinutes, isActive, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        name:
          $ref: '#/components/schemas/LocalizedText'
        description:
          oneOf:
            - $ref: '#/components/schemas/LocalizedText'
            - type: 'null'
        durationMinutes:
          type: integer
          minimum: 1
        priceEtb:
          type: [number, 'null']
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ServiceList:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ServiceView'
        nextCursor:
          type: [string, 'null']
          description: |
            Always `null` for `/businesses/{businessId}/services` —
            present for envelope symmetry; Phase 3 ships without
            pagination on this listing.
    StaffFieldsBase:
      type: object
      description: |
        Common fields for create / patch request bodies on a staff
        member. All fields optional in this base schema; create / patch
        add their own required-field constraints via `allOf`.
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 200
        role:
          type: [string, 'null']
          maxLength: 100
          description: |
            Free-text role title (e.g. `Senior Stylist`, `Barber`).
            `null` clears the field.
    CreateStaffRequest:
      allOf:
        - $ref: '#/components/schemas/StaffFieldsBase'
        - type: object
          required: [displayName]
    PatchStaffRequest:
      allOf:
        - $ref: '#/components/schemas/StaffFieldsBase'
        - type: object
          description: |
            Partial update. Each field optional. `displayName` cannot be
            `null` (DB is NOT NULL); `role` accepts `null` to clear.
            Unknown fields are tolerated.
    StaffView:
      type: object
      required: [id, businessId, displayName, isActive, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        displayName:
          type: string
        role:
          type: [string, 'null']
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    StaffList:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/StaffView'
        nextCursor:
          type: [string, 'null']
          description: |
            Always `null` for `/businesses/{businessId}/staff` —
            present for envelope symmetry; Phase 3 ships without
            pagination on this listing.
    TimeOfDay:
      type: string
      pattern: '^([01][0-9]|2[0-4]):[0-5][0-9](:[0-5][0-9])?$'
      description: |
        Clock time in the business's local timezone. Accepts `HH:MM`
        or `HH:MM:SS`. Hours range `00..24` (the `24:00:00` sentinel
        is allowed as an end-of-day marker). Server normalizes input
        to `HH:MM:SS`.
      example: '09:00:00'
    DateOnly:
      type: string
      format: date
      pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'
      example: '2026-05-14'
    WeeklyWindowInput:
      type: object
      required: [startTime, endTime]
      properties:
        startTime:
          $ref: '#/components/schemas/TimeOfDay'
        endTime:
          $ref: '#/components/schemas/TimeOfDay'
    WeeklyDayInput:
      type: object
      required: [weekday, windows]
      properties:
        weekday:
          type: integer
          minimum: 0
          maximum: 6
          description: '0 = Sunday … 6 = Saturday.'
        windows:
          type: array
          items:
            $ref: '#/components/schemas/WeeklyWindowInput'
    ReplaceWeeklyRequest:
      type: object
      required: [days]
      properties:
        days:
          type: array
          minItems: 7
          maxItems: 7
          description: |
            Exactly seven entries — one per weekday (0..6), each
            weekday appearing exactly once. An empty `windows` array
            communicates "closed all day" for that weekday.
          items:
            $ref: '#/components/schemas/WeeklyDayInput'
    AddOverrideRequest:
      type: object
      required: [specificDate, startTime, endTime]
      properties:
        specificDate:
          $ref: '#/components/schemas/DateOnly'
        startTime:
          $ref: '#/components/schemas/TimeOfDay'
        endTime:
          $ref: '#/components/schemas/TimeOfDay'
        isClosed:
          type: boolean
          default: false
          description: |
            `true` marks the window as a blackout over the weekly
            schedule. Defaults to `false`.
    AvailabilityWindowView:
      type: object
      required: [id, kind, startTime, endTime, isClosed]
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
          enum: [WEEKLY, OVERRIDE]
        weekday:
          type: [integer, 'null']
          minimum: 0
          maximum: 6
          description: 'Populated for WEEKLY rows; null for OVERRIDE.'
        specificDate:
          oneOf:
            - $ref: '#/components/schemas/DateOnly'
            - type: 'null'
          description: 'Populated for OVERRIDE rows; null for WEEKLY.'
        startTime:
          $ref: '#/components/schemas/TimeOfDay'
        endTime:
          $ref: '#/components/schemas/TimeOfDay'
        isClosed:
          type: boolean
    AvailabilityScheduleView:
      type: object
      required: [weekly, overrides]
      properties:
        weekly:
          type: array
          items:
            $ref: '#/components/schemas/AvailabilityWindowView'
        overrides:
          type: array
          items:
            $ref: '#/components/schemas/AvailabilityWindowView'
    Slot:
      type: object
      required: [startUtc, endUtc]
      properties:
        startUtc:
          type: string
          format: date-time
          description: UTC ISO-8601 timestamp of the slot's start.
        endUtc:
          type: string
          format: date-time
          description: UTC ISO-8601 timestamp of the slot's end (start + service duration).
    SlotList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Slot'
    AppointmentStatus:
      type: string
      enum:
        - REQUESTED
        - ACCEPTED
        - REJECTED
        - CANCELLED
        - COMPLETED
        - NO_SHOW
    PaymentMethod:
      type: string
      enum:
        - CASH
        - ONLINE_PENDING
    CancelledBy:
      type: [string, 'null']
      enum:
        - CUSTOMER
        - BUSINESS
        - ADMIN
        - null
    CreateAppointmentRequest:
      type: object
      required: [staffId, serviceId, startsAt, paymentMethod]
      properties:
        staffId:
          type: string
          format: uuid
        serviceId:
          type: string
          format: uuid
        startsAt:
          type: string
          format: date-time
          description: UTC ISO-8601 timestamp the customer wants to book.
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'
        notes:
          type: [string, 'null']
          maxLength: 2000
    AppointmentView:
      type: object
      required:
        - id
        - customerId
        - businessId
        - serviceId
        - staffId
        - startsAt
        - endsAt
        - status
        - paymentMethod
        - priceEtb
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        serviceId:
          type: string
          format: uuid
        staffId:
          type: string
          format: uuid
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/AppointmentStatus'
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'
        priceEtb:
          type: number
          description: Price in ETB, snapshotted from `services.price_etb` at booking time.
        notes:
          type: [string, 'null']
        cancelledBy:
          $ref: '#/components/schemas/CancelledBy'
        cancelReason:
          type: [string, 'null']
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AppointmentList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AppointmentView'
    TelegramLinkStartResponse:
      type: object
      required: [deepLink, expiresAt]
      properties:
        deepLink:
          type: string
          format: uri
          description: '`https://t.me/<botUsername>?start=<code>` — open in Telegram to redeem.'
        expiresAt:
          type: string
          format: date-time
          description: ISO-8601 UTC instant after which the code stops being valid.
    TelegramStatusResponse:
      type: object
      required: [linked]
      properties:
        linked:
          type: boolean
        linkedAt:
          type: [string, 'null']
          format: date-time
          description: '`updated_at` of the user row when `linked` is true; `null` otherwise.'
    TelegramUnlinkResponse:
      type: object
      required: [linked]
      properties:
        linked:
          type: boolean
          enum: [false]
          description: Always `false` — the unlink endpoint is idempotent.
    TelegramUpdate:
      type: object
      description: |
        Slice of the Telegram Bot API `Update` shape the handler
        actually reads. Telegram sends a richer payload — every other
        field is tolerated and ignored.
      properties:
        update_id:
          type: integer
        message:
          type: object
          properties:
            text:
              type: string
            chat:
              type: object
              properties:
                id:
                  oneOf:
                    - type: integer
                    - type: string
    TelegramWebhookAck:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [true]
          description: Always `true`. Telegram only inspects the HTTP status.
    NotificationStatus:
      type: string
      description: |
        Lifecycle state of a `notification_logs` row. The
        dispatcher writes the row at `QUEUED` and then flips it
        to `SENT` (provider acknowledged) or `FAILED` (provider
        raised an error, or the gateway is not configured).
        `DELIVERED` is reserved for a future read-receipt flow
        (SMS DLR callbacks, email opens) — no MVP producer.
      enum:
        - QUEUED
        - SENT
        - DELIVERED
        - FAILED
    NotificationChannel:
      type: string
      description: |
        Transport channel a notification went out on. Matches
        the `notification_logs.channel` CHECK constraint from
        migration 0013. `MOCK` is the MVP default — every
        booking lifecycle event currently lands on a mock
        gateway until real providers are configured.
      enum:
        - SMS
        - EMAIL
        - TELEGRAM
        - PUSH
        - MOCK
    NotificationLogView:
      type: object
      required:
        - id
        - recipientUserId
        - channel
        - templateKey
        - payload
        - status
        - provider
        - providerRef
        - errorMessage
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        recipientUserId:
          type: [string, 'null']
          format: uuid
          description: |
            The user the notification was addressed to. `null`
            iff the row outlived a hard-deleted user
            (`ON DELETE SET NULL` on the FK).
        channel:
          $ref: '#/components/schemas/NotificationChannel'
        templateKey:
          type: string
          description: |
            Application-layer template identifier (e.g.
            `booking.accepted.customer`). The set of valid keys
            is the `BookingTemplateKey` union owned by
            `templateRegistry.ts`; no DB CHECK.
        payload:
          type: object
          additionalProperties: true
          description: |
            Verbatim `payload` jsonb. Passes through unchanged
            for `<pre>` rendering in the admin dashboard.
        status:
          $ref: '#/components/schemas/NotificationStatus'
        provider:
          type: string
          description: |
            Provider identifier that handled the attempt (e.g.
            `MOCK`, future `TELEBIRR_SMS`). Free-form string
            mirroring `notification_logs.provider`.
        providerRef:
          type: [string, 'null']
          description: |
            External reference returned by the provider on
            `SENT` (e.g. an upstream message id). `null` on
            `QUEUED` / `FAILED`.
        errorMessage:
          type: [string, 'null']
          description: |
            Human-readable failure reason on `FAILED`. `null`
            otherwise.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    NotificationLogList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/NotificationLogView'
    RejectAppointmentRequest:
      type: object
      properties:
        reason:
          type: [string, 'null']
          maxLength: 1000
          description: |
            Optional human-readable reason. Logged in MVP; NOT
            persisted because the schema has no `reject_reason` column.
    CancelAppointmentRequest:
      type: object
      properties:
        reason:
          type: [string, 'null']
          maxLength: 1000
          description: Optional human-readable reason. Persisted to `appointments.cancel_reason`.
    RescheduleAppointmentRequest:
      type: object
      required: [startsAt]
      properties:
        startsAt:
          type: string
          format: date-time
          description: New UTC ISO-8601 start timestamp.
    CreateReviewRequest:
      type: object
      required: [rating]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: [string, 'null']
          maxLength: 2000
    ReviewView:
      type: object
      required:
        - id
        - appointmentId
        - customerId
        - businessId
        - rating
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        appointmentId:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: [string, 'null']
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ReviewList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReviewView'
    MediaView:
      type: object
      required: [id, ownerType, ownerId, s3Key, isPublic, createdAt]
      properties:
        id:
          type: string
          format: uuid
        ownerType:
          $ref: '#/components/schemas/MediaOwnerType'
        ownerId:
          type: string
          format: uuid
        s3Key:
          type: string
        contentType:
          type: [string, 'null']
        width:
          type: [integer, 'null']
        height:
          type: [integer, 'null']
        isPublic:
          type: boolean
        createdAt:
          type: string
          format: date-time
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, details]
          properties:
            code:
              type: string
              enum:
                - UNAUTHENTICATED
                - FORBIDDEN
                - NOT_FOUND
                - VALIDATION_ERROR
                - CONFLICT
                - SLOT_UNAVAILABLE
                - RATE_LIMITED
                - INTERNAL_ERROR
            message:
              type: string
            details:
              type: object
              additionalProperties: true
  responses:
    Unauthenticated:
      description: Missing or invalid Cognito JWT.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Authenticated, but caller lacks the required role or ownership.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: |
        Request conflicts with the current resource state (e.g. invalid
        status transition, duplicate per-owner business).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Target resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ValidationError:
      description: Request body or parameters failed validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: Unexpected server-side failure.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
