      operationId: rescheduleAppointment
      summary: Customer reschedules an appointment.
      description: |
        Authenticated. The state machine permits only `CUSTOMER` for
        RESCHEDULE — `BUSINESS_OWNER` and `ADMIN` attempts surface as
        409 CONFLICT.

        The new slot is re-validated against `SlotService.computeSlots`,
        so an unavailable target returns 409 `SLOT_UNAVAILABLE`. If
        the move succeeds and the row was `ACCEPTED`, the service
        resets the status to REQUESTED so the business must re-accept.
