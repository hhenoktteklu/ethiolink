openapi: 3.1.0
info:
  title: EthioLink API
  version: 0.1.0
  description: |
    EthioLink REST API. The canonical narrative contract lives in
    docs/architecture/API_SPEC.md; this OpenAPI document is filled out
    endpoint-by-endpoint as each phase ships. Phase 1 covers the auth/profile
    sync endpoints below.
servers:
  - url: https://api-dev.ethiolink.example/v1
    description: Dev (placeholder — replaced after `terraform apply`)
  - url: https://api.ethiolink.example/v1
    description: Prod (placeholder)
security:
  - cognito: []
tags:
  - name: auth
    description: Authentication and profile sync.
  - name: catalog
    description: Public-facing catalog (categories, businesses).
  - name: media
    description: Media uploads via S3 presigned URLs.
  - name: admin
    description: Admin-only endpoints. Require the ADMIN Cognito group; every write persists an `admin_actions` audit row.
paths:
  /categories:
    get:
      tags: [catalog]
      operationId: listCategories
      summary: List active business categories.
      description: |
        Returns active categories sorted by `sort_order ASC`, then by the
        English name. Public endpoint — no authentication required.

        The response always includes `nextCursor: null`. The category set
        is small (currently four MVP entries: Salon, Barber, Spa, Beauty
        Professional) and is not paginated; the cursor field is retained
        for symmetry with other listing endpoints so clients can handle
        every listing with a single code path.
      security: []
      responses:
        '200':
          description: The list of active categories.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryList'
        '500':
          $ref: '#/components/responses/InternalError'
  /businesses:
    get:
      tags: [catalog]
      operationId: listBusinesses
      summary: List APPROVED businesses with filters and cursor pagination.
      description: |
        Public endpoint. Returns approved businesses ordered by
        `featured_until DESC NULLS LAST, rating_avg DESC, created_at DESC,
        id DESC`. All filters are optional; an empty or whitespace-only
        value is treated as "no filter".

        Pagination is cursor-based. Pass the `nextCursor` value from a
        previous response as `cursor` to fetch the next page; `nextCursor`
        is `null` on the final page.
      security: []
      parameters:
        - name: category
          in: query
          required: false
          description: |
            Active category slug (e.g. `salon`). Rejected with
            VALIDATION_ERROR if the slug is unknown or inactive.
          schema:
            type: string
        - name: city
          in: query
          required: false
          description: Case-insensitive exact match on city name.
          schema:
            type: string
        - name: q
          in: query
          required: false
          description: |
            Free-text search (Phase 9 Track 6). Matches against
            business `name` + `description.en` + `description.am`
            via a GIN-indexed Postgres tsvector with `unaccent`
            normalisation, complemented by a trigram-indexed
            `lower(name) ILIKE` fallback for short prefixes. Empty /
            whitespace-only values are treated as "no filter". Max
            200 characters.
          schema:
            type: string
            maxLength: 200
        - name: query
          in: query
          required: false
          description: |
            Legacy alias for `q`, kept for backwards compatibility
            with clients that shipped before Phase 9 Track 6. New
            clients should use `q`. When both are sent, `q` wins.
          schema:
            type: string
            maxLength: 200
            deprecated: true
        - name: ratingMin
          in: query
          required: false
          schema:
            type: number
            minimum: 0
            maximum: 5
        - name: featuredOnly
          in: query
          required: false
          description: |
            Phase 9 Track 6. When `true`, filters to rows whose
            `featured_until > now()`. Surfaces the "show only
            featured" affordance on customer surfaces.
          schema:
            type: boolean
        - name: sort
          in: query
          required: false
          description: |
            Phase 9 Track 6. Sort mode. Default `featured` preserves
            the existing `featured_until DESC NULLS LAST,
            rating_avg DESC, created_at DESC, id DESC` order and is
            the only mode that supports cursor pagination today.
            `relevance` orders by full-text rank (only meaningful
            when `q` is present); `rating` orders by
            `rating_avg DESC, rating_count DESC`; `newest` orders
            by `created_at DESC`. Non-featured sorts emit
            `nextCursor: null` — clients fetch the first `limit`
            results and re-search if they need more.
          schema:
            type: string
            enum: [featured, relevance, rating, newest]
            default: featured
        - name: cursor
          in: query
          required: false
          description: |
            Opaque pagination cursor from a previous response.
            Only honoured when `sort=featured` (the default); other
            sort modes ignore the cursor.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: A page of approved businesses.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessList'
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [auth]
      operationId: createBusiness
      summary: Create a DRAFT business profile for the calling owner.
      description: |
        Authenticated. Requires the caller's role to be `BUSINESS_OWNER`.
        Creates a fresh DRAFT business owned by the caller; subsequent
        edits use `PATCH /v1/businesses/{id}`, submission for admin review
        uses `POST /v1/businesses/{id}/submit`.

        MVP enforces one business per owner. A second create call by the
        same owner returns 409 CONFLICT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBusinessRequest'
      responses:
        '200':
          description: The created business.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessOwnerView'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /businesses/{id}:
    get:
      tags: [catalog]
      operationId: getBusiness
      summary: Get one APPROVED business by id.
      description: |
        Public endpoint. Returns 404 if the id does not exist or if the
        business is not in the APPROVED state. The owner's view (any
        status) is served by `GET /v1/me/business`.
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The business profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessPublicView'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    patch:
      tags: [auth]
      operationId: patchBusiness
      summary: Edit the caller's business.
      description: |
        Authenticated. Requires the caller's role to be `BUSINESS_OWNER`
        and the caller to own the business (the request is rejected with
        403 otherwise). All fields are optional — `undefined` means "no
        change", explicit `null` clears the column. Unknown fields are
        tolerated. An empty `{}` body is a valid no-op.

        Phase 2 scope: owner-only. Admin write paths (API_SPEC notes
        "owner or ADMIN") land in Phase 5.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchBusinessRequest'
      responses:
        '200':
          description: The updated business.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessOwnerView'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /businesses/{id}/submit:
    post:
      tags: [auth]
      operationId: submitBusiness
      summary: Submit a DRAFT business for admin review.
      description: |
        Authenticated. Requires the caller's role to be `BUSINESS_OWNER`
        and ownership of the business. Transitions DRAFT → PENDING_REVIEW.
        Only valid from `DRAFT`; any other source status returns 409.

        Submission requires `name`, `description` (with non-empty `en`),
        `city`, and `categoryId` to be set on the business; otherwise the
        request is rejected with 400 and `details.missing[]` lists the
        empty fields.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The business with status PENDING_REVIEW.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessOwnerView'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /businesses/{businessId}/services:
    parameters:
      - name: businessId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [catalog]
      operationId: listServices
      summary: List active services for a business.
      description: |
        Public endpoint. Returns the business's active services ordered
        by `created_at ASC, id ASC` — the order the owner added them.
        Wrapped in `{ items, nextCursor: null }` for symmetry with
        other listings; service catalogs per business are small and
        Phase 3 ships without pagination.
      security: []
      responses:
        '200':
          description: The list of active services.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceList'
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [auth]
      operationId: createService
      summary: Create a new active service for a business.
      description: |
        Authenticated. Requires the caller's role to be `BUSINESS_OWNER`
        and to own the target business (Phase 3 strict-owner; admin
        write paths land in Phase 5).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServiceRequest'
      responses:
        '200':
          description: The created service.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceView'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /businesses/{businessId}/services/{id}:
    parameters:
      - name: businessId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      tags: [auth]
      operationId: patchService
      summary: Edit a service's mutable fields.
      description: |
        Authenticated. Requires `BUSINESS_OWNER` role and ownership of
        the parent business. Each field optional — absent means "no
        change". `name` and `durationMinutes` cannot be cleared (they
        are NOT NULL in the DB); `description` and `priceEtb` accept
        `null` to clear. `isActive` cannot be patched here — use DELETE
        to deactivate. Unknown fields are tolerated.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchServiceRequest'
      responses:
        '200':
          description: The updated service.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceView'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [auth]
      operationId: deleteService
      summary: Deactivate a service (soft-delete).
      description: |
        Authenticated. Requires `BUSINESS_OWNER` role and ownership of
        the parent business. Flips `is_active` to `false`; never removes
        the row (`appointments.service_id` is `ON DELETE RESTRICT`).
        The response body is the service with `isActive: false`.
      responses:
        '200':
          description: The deactivated service.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceView'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /businesses/{businessId}/staff:
    parameters:
      - name: businessId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [catalog]
      operationId: listStaff
      summary: List active staff members for a business.
      description: |
        Public endpoint. Returns the business's active staff members
        ordered by `created_at ASC, id ASC` — the order the owner added
        them. Wrapped in `{ items, nextCursor: null }` for symmetry.
        Phase 3 ships without pagination.
      security: []
      responses:
        '200':
          description: The list of active staff members.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffList'
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [auth]
      operationId: createStaff
      summary: Create a new active staff member for a business.
      description: |
        Authenticated. Requires the caller's role to be `BUSINESS_OWNER`
        and to own the target business (Phase 3 strict-owner; admin
        write paths land in Phase 5).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStaffRequest'
      responses:
        '200':
          description: The created staff member.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffView'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /businesses/{businessId}/staff/{id}:
    parameters:
      - name: businessId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      tags: [auth]
      operationId: patchStaff
      summary: Edit a staff member's mutable fields.
      description: |
        Authenticated. Requires `BUSINESS_OWNER` role and ownership of
        the parent business. Each field optional — absent means "no
        change". `displayName` cannot be cleared (it is NOT NULL in the
        DB); `role` accepts `null` to clear. `isActive` cannot be
        patched here — use DELETE to deactivate. Unknown fields are
        tolerated.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchStaffRequest'
      responses:
        '200':
          description: The updated staff member.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffView'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [auth]
      operationId: deleteStaff
      summary: Deactivate a staff member (soft-delete).
      description: |
        Authenticated. Requires `BUSINESS_OWNER` role and ownership of
        the parent business. Flips `is_active` to `false`; never removes
        the row (`appointments.staff_id` is `ON DELETE RESTRICT`). The
        response body is the staff member with `isActive: false`.
      responses:
        '200':
          description: The deactivated staff member.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffView'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /businesses/{businessId}/staff/{staffId}/availability:
    parameters:
      - name: businessId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: staffId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [catalog]
      operationId: getStaffAvailability
      summary: Get a staff member's weekly schedule and overrides.
      description: |
        Public endpoint. Returns the staff member's WEEKLY windows and
        OVERRIDE windows as two flat arrays. Returns 404 if the staff
        member does not exist or is inactive.
      security: []
      responses:
        '200':
          description: The staff member's schedule.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityScheduleView'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags: [auth]
      operationId: replaceStaffAvailability
      summary: Replace the staff member's entire weekly schedule.
      description: |
        Authenticated. Requires `BUSINESS_OWNER` role and ownership of
        the parent business. **Strict input:** the request must include
        all seven weekdays (0–6), each exactly once, even if a day has
        no windows. An empty `windows` array communicates "closed all
        day" intent.

        Existing WEEKLY rows are replaced atomically (DELETE + INSERT in
        a single transaction). OVERRIDE rows are not touched.

        `startTime` and `endTime` accept `HH:MM` or `HH:MM:SS`; the
        server normalizes to `HH:MM:SS`.

        Returns the full grouped schedule (weekly + overrides) so
        clients can refresh in one round-trip.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplaceWeeklyRequest'
      responses:
        '200':
          description: The updated schedule.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityScheduleView'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /businesses/{businessId}/staff/{staffId}/availability/override:
    parameters:
      - name: businessId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: staffId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [auth]
      operationId: addStaffAvailabilityOverride
      summary: Add a single availability override for a specific date.
      description: |
        Authenticated. Requires `BUSINESS_OWNER` role and ownership of
        the parent business. Adds a single OVERRIDE row to the staff
        member's schedule — either a special open window or, with
        `isClosed: true`, a blackout over the weekly schedule on the
        given date.

        `startTime` and `endTime` accept `HH:MM` or `HH:MM:SS`; the
        server normalizes to `HH:MM:SS`. `isClosed` defaults to `false`.
        A closed override does not require a matching open window on the
        same date.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddOverrideRequest'
      responses:
        '200':
          description: The newly-created override window.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityWindowView'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /businesses/{businessId}/staff/{staffId}/slots:
    parameters:
      - name: businessId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: staffId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [catalog]
      operationId: computeStaffSlots
      summary: Compute bookable slots for a staff member.
      description: |
        Public endpoint. Walks `[from, to]` one day at a time in the
        business timezone, assembles open windows from the staff
        member's WEEKLY availability plus OVERRIDE rows (open overrides
        extend, closed overrides remove), and emits bookable slots
        respecting:

        * the service's `durationMinutes` (slot length),
        * the system-wide `BOOKING_SLOT_STEP_MINUTES` cadence,
        * the `BOOKING_BUFFER_MINUTES` separation against existing
          appointments,
        * a "no slots in the past" filter.

        Phase 3 stubs the appointment-conflict lookup (always empty);
        Phase 4 wires the real `appointments` table without changing
        this contract.

        Returns slots as UTC ISO timestamp pairs. Date range capped at
        31 days; exceeding the cap returns `VALIDATION_ERROR`.
      security: []
      parameters:
        - name: serviceId
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: The service the customer wants to book.
        - name: from
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/DateOnly'
          description: Inclusive start of the date range in the business timezone.
        - name: to
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/DateOnly'
          description: Inclusive end of the date range in the business timezone.
      responses:
        '200':
          description: The list of bookable slots.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlotList'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /businesses/{businessId}/featuring/packages:
    get:
      tags: [auth]
      operationId: listFeaturingPackages
      summary: List paid featuring packages available for the business.
      description: |
        Authenticated. Caller must own the business. Phase 9 Track 6.
        Returns the configured packages (7-day / 30-day) with their
        env-configured ETB prices. 503 `FEATURING_DISABLED` when the
        operator hasn't enabled featuring in this env.
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The list of available featuring packages.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeaturingPackageList'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/InternalError'
  /businesses/{businessId}/featuring/subscribe:
    post:
      tags: [auth]
      operationId: subscribeFeaturing
      summary: Purchase a paid featuring subscription.
      description: |
        Authenticated. Caller must own the business. Phase 9 Track 6.
        Creates a `PENDING_PAYMENT` subscription, calls the payment
        gateway, then transitions to `ACTIVE` on synchronous
        SUCCEEDED (CASH gateway in MVP). When the gateway returns
        PENDING (future Telebirr), the subscription stays
        PENDING_PAYMENT and a webhook flips it to ACTIVE.

        Error codes:
          * 400 VALIDATION_ERROR — unknown `packageCode`.
          * 402 PAYMENT_REQUIRED — gateway returned FAILED (declined).
          * 403 FORBIDDEN — caller does not own the business.
          * 409 CONFLICT — business already has an ACTIVE subscription.
          * 503 FEATURING_DISABLED — featuring not enabled in this env.
          * 503 ONLINE_PAYMENTS_UNAVAILABLE — gateway not yet wired.
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscribeFeaturingRequest'
      responses:
        '200':
          description: The created (and potentially-activated) subscription.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeaturingSubscription'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '402':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/InternalError'
  /businesses/{businessId}/featuring/active:
    get:
      tags: [auth]
      operationId: getActiveFeaturing
      summary: Read the business's currently-ACTIVE subscription.
      description: |
        Authenticated. Caller must own the business. Phase 9 Track 6.
        Returns `{ active: <FeaturingSubscription> }` or
        `{ active: null }` when not currently featured. Independent of
        the `FEATURING_ENABLED` flag — owners on a disabled env can
        still read an admin-comp'd active row.
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The active subscription (or null).
          content:
            application/json:
              schema:
