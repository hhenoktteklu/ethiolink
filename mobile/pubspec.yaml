# EthioLink Mobile — Flutter app pubspec.
#
# Phase 9 Track 3 scaffold. This is the working pubspec authored
# in the "Phase 9: scaffold Flutter mobile app" commit; it
# replaces the Phase 0 `pubspec.placeholder.yaml`. The dependency
# set is intentionally minimal — only the runtime libraries the
# scaffold's placeholder screens need. Real auth (Cognito /
# Amplify), HTTP client (Dio + OpenAPI-generated client), state
# management (Riverpod), and routing (go_router) land in later
# Phase 9 mobile commits as each feature track lights up.

name: ethiolink
description: "EthioLink mobile app — beauty appointment booking for Ethiopia."
publish_to: "none"
version: 0.0.1+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Material icons + standard widget set come with Flutter; no
  # extra widget libs needed for the placeholder screens.

  # English-only at scaffold time; `am.arb` lands in the
  # localization track. The `intl` package is the standard
  # foundation Flutter uses for formatted output and is bundled
  # via flutter_localizations.
  intl: ^0.19.0

  # Phase 9 — Cognito PKCE auth. `flutter_appauth` is the standard
  # AppAuth wrapper covering authorize + token-exchange + refresh
  # + end-session. `flutter_secure_storage` backs the token cache
  # via Keychain (iOS) / Keystore (Android), so the refresh token
  # never lands on the device file system in plaintext.
  flutter_appauth: ^7.0.0
  flutter_secure_storage: ^9.2.2

  # Phase 9 — HTTP client. Dio's interceptor model fits the
  # auth-token-attachment pattern cleanly; the alternative
  # `package:http` would require a manual wrapper around every
  # call site. We swap to the OpenAPI-generated `dart-dio` client
  # in a future commit; the pubspec dependency is the same.
  dio: ^5.4.0

  # Phase 9 Track 2 — open Telegram deep links from the Profile-tab
  # link-Telegram screen. The package's `launchUrl` resolves a
  # `t.me://` (Android) / `https://t.me/<bot>?start=<code>`
  # universal-link (iOS) to the installed Telegram client. The
  # `LinkTelegramScreen` accepts a `LinkLauncher` override so widget
  # tests stay platform-channel-free.
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Lint ruleset. `flutter_lints` is the official Flutter team
  # baseline; we adopt it directly rather than `very_good_analysis`
  # (the placeholder doc's suggestion) until we have a concrete
  # reason to diverge.
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # Phase 9 Track 5 — enable Flutter's `gen-l10n` codegen. The
  # generator reads `lib/l10n/app_*.arb` (driven by the
  # sibling `l10n.yaml`) and emits the synthetic
  # `package:flutter_gen/gen_l10n/app_localizations.dart`
  # import every `flutter pub get` run. English is the only
  # locale shipped today; `app_am.arb` lands in the locale-
  # picker commit.
  generate: true
  # Asset declarations land here once the design pass adds
  # images. Empty today.
